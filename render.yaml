# 1. Shared Secrets Group (Fixes cross-service variable injection bug)
envVarGroups:
  - name: anon-chat-shared-secrets
    envVars:
      - key: CENTRIFUGO_API_KEY
        generateValue: true
      - key: CENTRIFUGO_HMAC_SECRET
        generateValue: true

# 2. Database Definition (Top-level section, completely isolated from services)
databases:
  - name: anon-chat-db
    plan: standard
    postgresMajorVersion: "15"
    databaseName: anon_chat
    user: anon_user

services:
  # 3. Redis Cache (Modern keyvalue type)
  - type: keyvalue
    name: anon-chat-redis
    plan: standard
    region: frankfurt
    ipAllowList: [] # Safe & completely private inside Render's private network

  # 4. FastAPI Backend Service (Scaled & Secure)
  - type: web
    name: anon-chat-backend
    plan: standard
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    numReplicas: 3
    region: frankfurt
    # healthCheckPath: /api/health # Uncomment if your FastAPI has a health check route
    fromGroup:
      name: anon-chat-shared-secrets # Automatically imports CENTRIFUGO_API_KEY & HMAC_SECRET
    envVars:
      - key: BOT_TOKEN
        sync: false # Set manually in your Render Dashboard settings
      - key: WEBAPP_URL
        value: https://onrender.com # Hardcoded to break the circular loop
      - key: DATABASE_URL
        fromDatabase:
          name: anon-chat-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: anon-chat-redis
          property: connectionString
      - key: CENTRIFUGO_URL
        value: http://anon-chat-centrifugo:8000 # Correct internal microservice routing

  # 5. Centrifugo Service (WebSocket Infrastructure)
  - type: web
    name: anon-chat-centrifugo
    plan: standard
    runtime: docker
    dockerfilePath: ./Dockerfile.centrifugo
    dockerCommand: centrifugo --config=/centrifugo/config.json
    port: 8000
    region: frankfurt
    fromGroup:
      name: anon-chat-shared-secrets # Imports the exact same keys as the Backend!
    envVars:
      - key: CENTRIFUGO_ADMIN_PASSWORD
        generateValue: true
      - key: CENTRIFUGO_ADMIN_SECRET
        generateValue: true
      # Map the shared group keys to the specific names Centrifugo expects
      - key: CENTRIFUGO_TOKEN_HMAC_SECRET_KEY
        fromGroup:
          name: anon-chat-shared-secrets
          envVarKey: CENTRIFUGO_HMAC_SECRET
      - key: CENTRIFUGO_ALLOWED_ORIGINS
        value: "*"

  # 6. Vue/Vite Frontend (Static Web App - Free & Globally Distributed)
  - type: static
    name: anon-chat-frontend
    runtime: static
    buildCommand: npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: anon-chat-backend
          property: url
      - key: VITE_CENTRIFUGO_URL
        fromService:
          type: web
          name: anon-chat-centrifugo
          property: url
