services:
  # 1. PostgreSQL Database
  - type: psqldb
    name: anon-chat-db
    plan: starter
    postgresMajorVersion: 15
    envVars:
      - key: POSTGRES_USER
        value: anon_user
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_DB
        value: anon_chat

  # 2. Redis Cache
  - type: redis
    name: anon-chat-redis
    plan: starter
    ipAllowList: [] # default to accessible within Render network

  # 3. FastAPI Backend Service
  - type: web
    name: anon-chat-backend
    plan: starter
    env: docker
    dockerfilePath: ./backend/Dockerfile
    region: frankfurt
    envVars:
      - key: BOT_TOKEN
        sync: false # Must be set manually in Render Dashboard
      - key: WEBAPP_URL
        value: https://anon-chat-frontend.onrender.com # Change to custom domain later
      - key: DATABASE_URL
        fromDatabase:
          name: anon-chat-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: anon-chat-redis
          property: connectionString
      - key: CENTRIFUGO_URL
        value: http://anon-chat-centrifugo:8000
      - key: CENTRIFUGO_API_KEY
        generateValue: true
      - key: CENTRIFUGO_HMAC_SECRET
        generateValue: true

  # 4. Centrifugo Service
  - type: web
    name: anon-chat-centrifugo
    plan: starter
    env: docker
    dockerCommand: centrifugo --config=/centrifugo/config.json
    region: frankfurt
    envVars:
      - key: CENTRIFUGO_ADMIN_PASSWORD
        generateValue: true
      - key: CENTRIFUGO_ADMIN_SECRET
        generateValue: true
      - key: CENTRIFUGO_API_KEY
        fromService:
          type: web
          name: anon-chat-backend
          envVarKey: CENTRIFUGO_API_KEY
      - key: CENTRIFUGO_TOKEN_HMAC_SECRET_KEY
        fromService:
          type: web
          name: anon-chat-backend
          envVarKey: CENTRIFUGO_HMAC_SECRET
      - key: CENTRIFUGO_ALLOWED_ORIGINS
        value: "*"

  # 5. Frontend Service (Vue.js)
  - type: web
    name: anon-chat-frontend
    plan: starter
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    region: frankfurt
    envVars:
      - key: VITE_API_URL
        value: https://anon-chat-backend.onrender.com
