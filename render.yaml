# PostgreSQL — separate top-level section (NOT under services)
databases:
  - name: anon-chat-db
    plan: basic-256mb          # or: free (expires in 30 days)
    postgresMajorVersion: "15"
    region: frankfurt
    databaseName: anon_chat
    user: anon_user
    ipAllowList: []            # internal-only access

services:
  # 1. Redis Cache
  - type: keyvalue             # "redis" still works but keyvalue is current
    name: anon-chat-redis
    plan: starter
    region: frankfurt
    ipAllowList: []            # internal-only access

  # 2. FastAPI Backend
  - type: web
    name: anon-chat-backend
    plan: starter
    runtime: docker            # use runtime: docker (not env: docker)
    dockerfilePath: ./backend/Dockerfile
    region: frankfurt
    healthCheckPath: /api/health
    envVars:
      - key: BOT_TOKEN
        sync: false            # set manually in Dashboard
      - key: WEBAPP_URL
        value: https://anon-chat-frontend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: anon-chat-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: anon-chat-redis
          property: connectionString
      - key: CENTRIFUGO_URL
        value: http://anon-chat-centrifugo:8000
      - key: CENTRIFUGO_API_KEY
        generateValue: true
      - key: CENTRIFUGO_HMAC_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: '["https://anon-chat-frontend.onrender.com"]'

  # 3. Centrifugo (real-time WebSocket)
  - type: web
    name: anon-chat-centrifugo
    plan: starter
    runtime: docker
    dockerfilePath: ./config/Dockerfile
    dockerCommand: centrifugo --config=/centrifugo/config.json
    region: frankfurt
    envVars:
      - key: CENTRIFUGO_ADMIN_PASSWORD
        generateValue: true
      - key: CENTRIFUGO_ADMIN_SECRET
        generateValue: true
      - key: CENTRIFUGO_API_KEY
        fromService:
          type: web
          name: anon-chat-backend
          envVarKey: CENTRIFUGO_API_KEY
      - key: CENTRIFUGO_TOKEN_HMAC_SECRET_KEY
        fromService:
          type: web
          name: anon-chat-backend
          envVarKey: CENTRIFUGO_HMAC_SECRET
      - key: CENTRIFUGO_ALLOWED_ORIGINS
        value: "*"

  # 4. Frontend (Vue.js)
  - type: web
    name: anon-chat-frontend
    plan: starter
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    region: frankfurt
    envVars:
      - key: VITE_API_URL
        value: https://anon-chat-backend.onrender.com/api
      - key: VITE_CENTRIFUGO_URL
        value: wss://anon-chat-centrifugo.onrender.com/connection/websocket
