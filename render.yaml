services:
  # 1. PostgreSQL Database
  - type: psqldb
    name: anon-chat-db
    plan: standard
    postgresMajorVersion: 15
    envVars:
      - key: POSTGRES_USER
        value: anon_user
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_DB
        value: anon_chat

  # 2. Redis Cache (Essential for real-time matches & pub/sub)
  - type: redis
    name: anon-chat-redis
    plan: standard
    ipAllowList: [] # default to accessible within Render network

  # 3. FastAPI Backend Service (Scaled to 3 replicas for high availability)
  - type: web
    name: anon-chat-backend
    plan: standard
    env: docker
    dockerfilePath: ./backend/Dockerfile
    numReplicas: 3
    region: frankfurt
    envVars:
      - key: BOT_TOKEN
        sync: false # Must be set manually in Render Dashboard (get from @BotFather)
      - key: WEBAPP_URL
        fromService:
          type: static
          name: anon-chat-frontend
          property: url
      - key: DATABASE_URL
        fromDatabase:
          name: anon-chat-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: anon-chat-redis
          property: connectionString
      - key: CENTRIFUGO_URL
        value: http://anon-chat-centrifugo:8000
      - key: CENTRIFUGO_API_KEY
        generateValue: true
      - key: CENTRIFUGO_HMAC_SECRET
        generateValue: true

  # 4. Centrifugo Service (WebSocket engine handling 5k+ concurrent client connections)
  - type: web
    name: anon-chat-centrifugo
    plan: standard
    env: docker
    dockerfilePath: ./Dockerfile.centrifugo
    port: 8000
    region: frankfurt
    envVars:
      - key: CENTRIFUGO_ADMIN_PASSWORD
        generateValue: true
      - key: CENTRIFUGO_ADMIN_SECRET
        generateValue: true
      - key: CENTRIFUGO_API_KEY
        fromService:
          type: web
          name: anon-chat-backend
          envVarKey: CENTRIFUGO_API_KEY
      - key: CENTRIFUGO_TOKEN_HMAC_SECRET_KEY
        fromService:
          type: web
          name: anon-chat-backend
          envVarKey: CENTRIFUGO_HMAC_SECRET
      - key: CENTRIFUGO_ALLOWED_ORIGINS
        value: "*"

  # 5. Vue/Vite Frontend (Static Web App - Free & handles unlimited traffic)
  - type: static
    name: anon-chat-frontend
    plan: starter
    env: static
    buildCommand: npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: anon-chat-backend
          property: url
      - key: VITE_CENTRIFUGO_URL
        fromService:
          type: web
          name: anon-chat-centrifugo
          property: url
