databases:
  - name: anon-chat-db
    databaseName: anon_chat
    user: anon_user
    plan: standard
    postgresMajorVersion: "15"

services:
  # Redis
  - type: keyvalue
    name: anon-chat-redis
    plan: standard

  # FastAPI Backend
  - type: web
    name: anon-chat-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    plan: standard
    region: frankfurt

    envVars:
      - key: BOT_TOKEN
        sync: false

      - key: WEBAPP_URL
        fromService:
          type: web
          name: anon-chat-frontend
          property: url

      - key: DATABASE_URL
        fromDatabase:
          name: anon-chat-db
          property: connectionString

      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: anon-chat-redis
          property: connectionString

      - key: CENTRIFUGO_URL
        fromService:
          type: web
          name: anon-chat-centrifugo
          property: url

      - key: CENTRIFUGO_API_KEY
        generateValue: true

      - key: CENTRIFUGO_HMAC_SECRET
        generateValue: true

  # Centrifugo
  - type: web
    name: anon-chat-centrifugo
    runtime: docker
    dockerfilePath: ./Dockerfile.centrifugo
    plan: standard
    region: frankfurt

    envVars:
      - key: CENTRIFUGO_ADMIN_PASSWORD
        generateValue: true

      - key: CENTRIFUGO_ADMIN_SECRET
        generateValue: true

      - key: CENTRIFUGO_API_KEY
        fromService:
          type: web
          name: anon-chat-backend
          envVarKey: CENTRIFUGO_API_KEY

      - key: CENTRIFUGO_TOKEN_HMAC_SECRET_KEY
        fromService:
          type: web
          name: anon-chat-backend
          envVarKey: CENTRIFUGO_HMAC_SECRET

      - key: CENTRIFUGO_ALLOWED_ORIGINS
        value: "*"

  # Frontend
  - type: web
    name: anon-chat-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: starter
    region: frankfurt

    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: anon-chat-backend
          property: url

      - key: VITE_CENTRIFUGO_URL
        fromService:
          type: web
          name: anon-chat-centrifugo
          property: url
