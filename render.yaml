databases:
  - name: anon-chat-db
    databaseName: anon_chat
    user: anon_user
    plan: standard
    postgresMajorVersion: "15"
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

services:
  # 1. Redis Cache (Render Key-Value Service)
  - type: keyvalue
    name: anon-chat-redis
    plan: standard
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

  # 2. FastAPI Backend Service (Scaled to 3 replicas for high availability)
  - type: web
    name: anon-chat-backend
    plan: standard
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    numReplicas: 3
    region: frankfurt
    envVars:
      - key: BOT_TOKEN
        sync: false # Must be set manually in Render Dashboard (get from @BotFather)
      - key: WEBAPP_URL
        value: https://anon-chat-frontend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: anon-chat-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: anon-chat-redis
          property: connectionString
      - key: CENTRIFUGO_URL
        value: http://anon-chat-centrifugo:8000
      - key: CENTRIFUGO_API_KEY
        generateValue: true
      - key: CENTRIFUGO_HMAC_SECRET
        generateValue: true

  # 3. Centrifugo Service (WebSocket engine handling 5k+ concurrent client connections)
  - type: web
    name: anon-chat-centrifugo
    plan: standard
    runtime: docker
    dockerfilePath: ./Dockerfile.centrifugo
    port: 8000
    region: frankfurt
    envVars:
      - key: CENTRIFUGO_ADMIN_PASSWORD
        generateValue: true
      - key: CENTRIFUGO_ADMIN_SECRET
        generateValue: true
      - key: CENTRIFUGO_API_KEY
        fromService:
          type: web
          name: anon-chat-backend
          envVarKey: CENTRIFUGO_API_KEY
      - key: CENTRIFUGO_TOKEN_HMAC_SECRET_KEY
        fromService:
          type: web
          name: anon-chat-backend
          envVarKey: CENTRIFUGO_HMAC_SECRET
      - key: CENTRIFUGO_ALLOWED_ORIGINS
        value: "*"

  # 4. Vue/Vite Frontend (Static Web App - Free & handles unlimited traffic)
  - type: static
    name: anon-chat-frontend
    plan: starter
    buildCommand: npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://anon-chat-backend.onrender.com
      - key: VITE_CENTRIFUGO_URL
        value: https://anon-chat-centrifugo.onrender.com
